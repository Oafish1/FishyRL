# Reaches optimality in 24k steps (1.6h), stabilizes around 33k (2.5h)
name: "CartPole"

# Training recipe
training:
  # Setup
  seed: 42

  # Timesteps
  steps: 1.0e+6
  pretrain_steps: 1024

  # Sample dimensions
  batch_size: 16
  sequence_length: 64
  imagination_horizon: 15

  # Discount parameters
  gamma: .997
  lmbda: .95
  tau: .02

# Ratio configuration
replay:
  ratio: 0.5

# Buffer configuration
buffer:
  capacity: 1.0e+6

# Scaling configuration
scaler:
  eps: 1.0

# Environment configuration
env:
  num: 4
  name: 'CartPole-v1'
  actions:
    - type: "Discrete"
      num_options: 2

# Model configuration
model:
  global:
    # Hidden dimensions
    embedded: 256
    blocks: 1
    dense: 256

    # Bins
    categorical_bins: 32
    reward_bins: 255

    # Output dimensions
    stochastic_dim: 32
    deterministic_dim: 256

  world:
    lr: 1.0e-4
    eps: 1.0e-8
    learnable_initial_state: false

  actor:
    lr: 8.0e-5
    eps: 1.0e-5

  critic:
    lr: 8.0e-5
    eps: 1.0e-5
