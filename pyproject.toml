[project]
name = "fishyrl"
version = "0.2.0"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "numpy",
    "torch",
]

[project.optional-dependencies]
dev = [
    "pip-tools",
    "pytest",
    "ruff",
    "sphinx",
]

[tool.ruff]
line-length = 80

[tool.ruff.format]
quote-style = "single"

[tool.ruff.lint]
extend-select = ["ANN", "D", "I", "W"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401", "D104"]
"test_*.py" = ["ANN201", "D100", "D103"]
"docs/**/*.py" = ["D100"]

[tool.ruff.lint.pydocstyle]
convention = "google"
